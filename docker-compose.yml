services:
  mcp-komoot:
    build: .
    container_name: mcp-komoot
    restart: unless-stopped
    env_file: .env
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3007
      - KOMOOT_DATA_DIR=${KOMOOT_DATA_DIR:-/tmp/komoot}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    networks:
      backends:
        aliases:
          - komoot-backend
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3007/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  backends:
    external: true
    name: ${BACKEND_NETWORK:-mcp-hub-backends}
